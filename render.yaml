databases:
  - name: logistics-db
    plan: free
    databaseName: ai_logistics
    user: logistics_user

services:
  - type: redis
    name: logistics-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: ai-logistics-whatsapp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: logistics-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: logistics-redis
          type: redis
          property: connectionString
      - key: ENV
        value: production
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        value: "whatsapp:+14155238886"
      - key: TWILIO_SMS_NUMBER
        value: "+14155238886"
      - key: AI_PROVIDER
        value: disabled
      - key: PYTHON_VERSION
        value: "3.11.0"
